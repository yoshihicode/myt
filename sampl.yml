# ==============================================================================
# myt - MySQL/MariaDB Tiny TUI Client Configuration Sample
# ==============================================================================
# This file contains all possible configuration patterns for myt.
# You can load this file by launching the app with: myt -conf=myt.yaml

# ------------------------------------------------------------------------------
# Standard Local Connection with default Character Set (Read-Write Mode)
# Enforces 'autocommit=0' in Read-Write mode to prevent immediate unintended commits.
# ------------------------------------------------------------------------------
- name: local-dev-rw
  host: 127.0.0.1
  port: 3306
  user: root
  password: password123
  database: dev_db
  tee: local-dev-rw.logs
  readwrite: true

# ------------------------------------------------------------------------------
# Standard Remote Connection (Default Read-Only Mode)
# ------------------------------------------------------------------------------
- name: production-replica-ro
  host: db-replica.example.com
  port: 3306
  user: analytics_user
  password: secure_password_456
  database: production_db
  tee: production-replica-ro.logs
  readwrite: false
  charset: utf8mb4

# ------------------------------------------------------------------------------
# ssh_ Tunneling via Bastion Host using Private Key (Read-Write Mode)
# ------------------------------------------------------------------------------
- name: production-main-via-ssh_-key
  host: 10.0.1.25          # Internal DB IP/Host (accessible from the bastion host)
  port: 3306               # Internal DB port
  user: primary_admin
  password: admin_db_password_789
  database: e_commerce_db
  tee: production-main-via-ssh_-key.logs
  readwrite: true          # Allows DML execution with enforced autocommit=0
  charset: utf8mb4
  ssh_host: bastion.example.com
  ssh_port: 22
  ssh_user: ec2-user
  ssh_key: ~/.ssh_/id_rsa    # Path to your local ssh_ private key file

# ------------------------------------------------------------------------------
# ssh_ Tunneling via Bastion Host using Password (Read-Only Mode)
# ------------------------------------------------------------------------------
- name: staging-db-via-ssh_-pass
  host: 192.168.10.50
  port: 3306
  user: audit_user
  password: staging_db_password
  database: staging_db
  tee: staging-db-via-ssh_-pass.logs
  readwrite: false
  charset: utf8mb4
  ssh_host: jump.staging.internal
  ssh_port: 22
  ssh_user: deploy_worker
  ssh_password: ssh__login_password_xyz

# ------------------------------------------------------------------------------
# Legacy Database Connection with Custom Character Set
# ------------------------------------------------------------------------------
- name: legacy-archive-utf8
  host: archive-db.local
  port: 3306
  user: archive_reader
  password: legacy_password_999
  database: old_records_db
  tee: legacy-archive-utf8.logs
  readwrite: false
  charset: utf8